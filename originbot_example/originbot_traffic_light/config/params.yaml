traffic_light_detector:
  ros__parameters:
    image_topic: /bgr8_image
    output_topic: /traffic_light/state

    # ROIs on 640x480 image
    left_x: 128
    left_y: 154
    left_w: 131
    left_h: 109

    mid_x: 259
    mid_y: 154
    mid_w: 131
    mid_h: 109

    right_x: 391
    right_y: 154
    right_w: 131
    right_h: 109

    # HSV thresholds – green
    green_h_low: 35
    green_s_low: 80
    green_v_low: 80
    green_h_high: 90
    green_s_high: 255
    green_v_high: 255

    # HSV thresholds – red (lower range)
    red1_h_low: 0
    red1_s_low: 80
    red1_v_low: 80
    red1_h_high: 10
    red1_s_high: 255
    red1_v_high: 255

    # HSV thresholds – red (upper range)
    red2_h_low: 160
    red2_s_low: 80
    red2_v_low: 80
    red2_h_high: 179
    red2_s_high: 255
    red2_v_high: 255

    # Ratio thresholds
    min_green_ratio: 0.01
    min_red_ratio: 0.01
