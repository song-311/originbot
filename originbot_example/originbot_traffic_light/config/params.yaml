traffic_light_detector:
  ros__parameters:
    # OriginBot camera publishes frames on /image_raw; override with the
    # image_topic launch argument if your setup uses a different topic.
    image_topic: /image_raw
    output_topic: /traffic_light/state

    # Detection mode: "roi" (default, fixed-ROI) or "card" (auto printed-card detection)
    mode: roi

    # ROIs on 640x480 image (used in roi mode only)
    left_x: 128
    left_y: 154
    left_w: 131
    left_h: 109

    mid_x: 259
    mid_y: 154
    mid_w: 131
    mid_h: 109

    right_x: 391
    right_y: 154
    right_w: 131
    right_h: 109

    # HSV thresholds – green
    green_h_low: 35
    green_s_low: 80
    green_v_low: 80
    green_h_high: 90
    green_s_high: 255
    green_v_high: 255

    # HSV thresholds – red (lower range)
    red1_h_low: 0
    red1_s_low: 80
    red1_v_low: 80
    red1_h_high: 10
    red1_s_high: 255
    red1_v_high: 255

    # HSV thresholds – red (upper range)
    red2_h_low: 160
    red2_s_low: 80
    red2_v_low: 80
    red2_h_high: 179
    red2_s_high: 255
    red2_v_high: 255

    # Ratio thresholds
    min_green_ratio: 0.01
    min_red_ratio: 0.01

    # Card mode parameters (used when mode: card)
    card_warp_width: 320
    card_warp_height: 120
    min_card_area: 5000
    card_aspect_ratio_min: 1.5  # typical card is ~3:1; allow 1.5–6.0 for perspective distortion
    card_aspect_ratio_max: 6.0
    band_margin_px: 5

    # Debug image output (card mode only)
    debug: false
    debug_topic: /traffic_light/debug

    # Publish a state message on every processed frame even when detection fails
    # (state=UNKNOWN, confidence=0.0).  Set to false to revert to the old
    # behaviour of only publishing on confident detections.
    publish_unknown: true
