traffic_light_detector:
  ros__parameters:
    # OriginBot camera publishes frames on /image_raw; override with the
    # image_topic launch argument if your setup uses a different topic.
    image_topic: /image_raw
    output_topic: /traffic_light/state

    # Detection mode: "roi" (default, fixed-ROI) or "card" (auto printed-card detection)
    mode: roi

    # -----------------------------------------------------------------------
    # ROI parameters (used in roi mode only)
    #
    # Precedence: if *_w_ratio and *_h_ratio are both > 0 for a band, the
    # ratio set is considered "active" and the node derives absolute pixel
    # coordinates from the current frame dimensions.  x/y ratios must be in
    # [0, 1] and w/h ratios in (0, 1].  Any out-of-range value triggers a
    # one-time warning and falls back to the absolute pixel parameters below.
    # When all ratio params are 0.0 (the default) the absolute pixel ROIs are
    # used directly – existing configs continue to work unchanged.
    # -----------------------------------------------------------------------

    # Absolute pixel ROIs (640×480 defaults; used when ratio params are 0)
    left_x: 40
    left_y: 120
    left_w: 210
    left_h: 260

    mid_x: 250
    mid_y: 150
    mid_w: 150
    mid_h: 230

    right_x: 400
    right_y: 120
    right_w: 210
    right_h: 260

    # Normalised ratio ROIs (0.0 = disabled; set w/h > 0 to activate).
    # Example for a 640×480 frame equivalent to the absolute values above:
    #   left_x_ratio: 0.200   left_y_ratio: 0.321   left_w_ratio: 0.205   left_h_ratio: 0.227
    left_x_ratio: 0.0
    left_y_ratio: 0.0
    left_w_ratio: 0.0
    left_h_ratio: 0.0

    mid_x_ratio: 0.0
    mid_y_ratio: 0.0
    mid_w_ratio: 0.0
    mid_h_ratio: 0.0

    right_x_ratio: 0.0
    right_y_ratio: 0.0
    right_w_ratio: 0.0
    right_h_ratio: 0.0

    # HSV thresholds – green
    green_h_low: 35
    green_s_low: 80
    green_v_low: 80
    green_h_high: 90
    green_s_high: 255
    green_v_high: 255

    # HSV thresholds – red (lower range)
    red1_h_low: 0
    red1_s_low: 80
    red1_v_low: 80
    red1_h_high: 10
    red1_s_high: 255
    red1_v_high: 255

    # HSV thresholds – red (upper range)
    red2_h_low: 160
    red2_s_low: 80
    red2_v_low: 80
    red2_h_high: 179
    red2_s_high: 255
    red2_v_high: 255

    # Ratio thresholds
    min_green_ratio: 0.01
    min_red_ratio: 0.01

    # Card mode parameters (used when mode: card)
    card_warp_width: 320
    card_warp_height: 120
    min_card_area: 5000
    card_aspect_ratio_min: 1.5  # typical card is ~3:1; allow 1.5–6.0 for perspective distortion
    card_aspect_ratio_max: 6.0
    band_margin_px: 5

    # Debug image output (card mode only)
    debug: false
    debug_topic: /traffic_light/debug

    # Publish a state message on every processed frame even when detection fails
    # (state=UNKNOWN, confidence=0.0).  Set to false to revert to the old
    # behaviour of only publishing on confident detections.
    publish_unknown: true

    # -----------------------------------------------------------------------
    # Temporal debounce
    #
    # debounce_frames: number of consecutive frames a candidate state must be
    #   observed before the published stable state is updated.  Setting this
    #   to 1 disables debounce (every frame's detection is published immediately).
    #   Increase to 3–5 frames to suppress spurious single-frame flips.
    # debounce_unknown: when true (default) the UNKNOWN state also requires a
    #   streak before taking effect.  Set to false to allow the detector to
    #   drop back to UNKNOWN immediately (useful if you rely on UNKNOWN as a
    #   "lost sight of sign" signal).
    # -----------------------------------------------------------------------
    debounce_frames: 3
    debounce_unknown: true
